services:
  app:
    build: .
    container_name: avalia_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: avaliaja
      DB_USER: avalia_user
      DB_PASSWORD: avalia_pass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html

  db:
    image: mariadb:10.11
    container_name: avalia_db
    restart: always
    environment:
      MARIADB_DATABASE: avaliaja
      MARIADB_USER: avalia_user
      MARIADB_PASSWORD: avalia_pass
      MARIADB_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./avaliaja.sql:/docker-entrypoint-initdb.d/01-avaliaja.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: avalia_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: